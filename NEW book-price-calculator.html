<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>คำนวณราคาค่าพิมพ์หนังสือ — สยามพิมพ์นานา</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Sarabun', sans-serif; background: #f0f0f0; color: #1a1a1a; min-height: 100vh; }
.main { max-width: 860px; margin: 20px auto; padding: 0 12px 40px; }
.header-box { background: #1a7ab5; color: #fff; padding: 10px 16px; border-radius: 6px 6px 0 0; font-size: 16px; font-weight: 700; }
.form-box { background: #fff; border: 1px solid #c0d8e8; border-top: none; border-radius: 0 0 6px 6px; padding: 16px; display: grid; grid-template-columns: 1fr 1fr; gap: 0 32px; }
@media(max-width:600px){ .form-box { grid-template-columns: 1fr; } }
.field { margin-bottom: 12px; }
.field label { display: block; font-size: 13px; color: #333; margin-bottom: 4px; }
.field select, .field input[type=number] { width: 100%; padding: 6px 10px; border: 1px solid #aac8dc; border-radius: 4px; font-size: 14px; font-family: inherit; background: #fff; }
.radio-row { display: flex; gap: 20px; margin-top: 2px; }
.radio-row label { display: flex; align-items: center; gap: 5px; font-size: 13px; cursor: pointer; font-weight: normal; }
.divider { grid-column: 1/-1; border: none; border-top: 1px dashed #ccc; margin: 4px 0 10px; }
.btn-row { grid-column: 1/-1; display: flex; gap: 10px; margin-top: 6px; }
.btn-calc { padding: 10px 28px; background: #8dc63f; color: #fff; border: none; border-radius: 4px; font-size: 15px; font-family: inherit; font-weight: 700; cursor: pointer; }
.btn-calc:hover { background: #7ab035; }
.btn-clear { padding: 10px 20px; background: #bbb; color: #fff; border: none; border-radius: 4px; font-size: 14px; font-family: inherit; cursor: pointer; }
.result-box { background: #fff; border: 1px solid #c0d8e8; border-radius: 6px; margin-top: 16px; }
.result-header { background: #1a7ab5; color: #fff; padding: 8px 16px; border-radius: 6px 6px 0 0; font-size: 14px; font-weight: 700; }
.result-inner { padding: 16px; }
.result-table { width: 100%; border-collapse: collapse; font-size: 13px; }
.result-table th { background: #2c3e6b; color: #fff; padding: 7px 10px; text-align: left; }
.result-table th:last-child { text-align: right; }
.result-table td { padding: 7px 10px; border-bottom: 1px solid #e8eef4; }
.result-table td:last-child { text-align: right; }
.result-table tr:last-child td { border-bottom: none; }
.result-table tr:nth-child(even) td { background: #f5f9fc; }
.total-row td { font-weight: 700; background: #e8f4fc !important; font-size: 14px; }
.per-book-row td { background: #eaf7e0 !important; color: #3a7a00; font-weight: 600; }
.note { font-size: 11px; color: #888; margin-top: 10px; background: #fffbeb; border: 1px solid #fcd34d; border-radius: 4px; padding: 8px 12px; }
.inquiry { color: #c0392b; font-weight: 600; }
.placeholder { color: #aaa; font-size: 13px; text-align: center; padding: 30px; }
</style>
</head>
<body>
<div class="main">
  <div class="header-box">คำนวณราคาค่าพิมพ์หนังสือ</div>
  <div class="form-box">
    <div>
      <div class="field">
        <label>หนังสือขนาด</label>
        <select id="bookSize">
          <option value="a4">A4 ขนาด 21 × 29.7 cm</option>
          <option value="b5">B5 ขนาด 18.2 × 25.7 cm</option>
          <option value="a5" selected>A5 ขนาด 14.8 × 21 cm</option>
          <option value="a3">A3 ขนาด 29.7 × 42 cm</option>
        </select>
      </div>
      <div class="field">
        <label>จำนวนหน้าทั้งหมด (ไม่รวมปก)</label>
        <input type="number" id="totalPages" value="" min="4" step="2" placeholder="จำนวนหน้า" />
      </div>
      <div class="field">
        <label>พิมพ์ขาว-ดำ 🖤 หน้า</label>
        <input type="number" id="bwPages" value="0" min="0" step="2" />
      </div>
      <div class="field">
        <label>กระดาษ (ขาว-ดำ)</label>
        <select id="bwPaper">
          <option value="bond">ปอนด์ 70 แกรม</option>
          <option value="eyecare">กระดาษถนอมสายตา</option>
        </select>
      </div>
      <div class="field">
        <label>การพิมพ์ขาว-ดำ</label>
        <div class="radio-row">
          <label><input type="radio" name="bwSide" value="double" checked> พิมพ์หน้า-หลัง</label>
          <label><input type="radio" name="bwSide" value="single"> พิมพ์หน้าเดียว</label>
        </div>
      </div>
      <div class="field">
        <label>พิมพ์ 4 สี 🎨 หน้า</label>
        <input type="number" id="colorPages" value="0" min="0" step="2" />
      </div>
      <div class="field">
        <label>กระดาษ (4 สี)</label>
        <select id="colorPaper">
          <option value="bond">ปอนด์ 70 แกรม</option>
          <option value="art">อาร์ต มัน/ด้าน (สอบถามราคา)</option>
          <option value="eyecare">กระดาษถนอมสายตา</option>
        </select>
      </div>
      <div class="field">
        <label>การพิมพ์สี</label>
        <div class="radio-row">
          <label><input type="radio" name="colorSide" value="double" checked> พิมพ์หน้า-หลัง</label>
          <label><input type="radio" name="colorSide" value="single"> พิมพ์หน้าเดียว</label>
        </div>
      </div>
    </div>
    <div>
      <div class="field">
        <label>จำนวนเล่ม</label>
        <input type="number" id="copies" value="1" min="1" />
      </div>
      <div class="field">
        <label>ประเภทปกหนังสือ</label>
        <select id="coverType">
          <option value="color4_1">4 สี (1 ด้าน)</option>
          <option value="color4_2">4 สี (2 ด้าน)</option>
          <option value="bw">ขาว-ดำ</option>
        </select>
      </div>
      <div class="field">
        <label>กระดาษปก</label>
        <select id="coverPaper">
          <option value="art250">อาร์ต 250 แกรม</option>
          <option value="art300">อาร์ต 300 แกรม</option>
        </select>
      </div>
      <div class="field">
        <label>การเคลือบปก</label>
        <select id="laminate">
          <option value="none">ไม่เคลือบ</option>
          <option value="gloss">เคลือบ PVC มัน</option>
          <option value="matt">เคลือบ PVC ด้าน</option>
        </select>
      </div>
      <div class="field">
        <label>วิธีการเข้าเล่ม</label>
        <select id="binding">
          <option value="perfect">ใสสันกาว</option>
          <option value="saddle">เย็บกลาง/เย็บมุมหลังคา</option>
          <option value="spiral">สันห่วง/ขดลวด (สอบถาม)</option>
        </select>
      </div>
      <hr class="divider">
      <div class="btn-row">
        <button class="btn-calc" onclick="calculate()">คำนวณราคา</button>
        <button class="btn-clear" onclick="clearForm()">ลบข้อมูล</button>
      </div>
    </div>
  </div>

  <div class="result-box">
    <div class="result-header" id="resultHeader">กรุณาระบุข้อมูลหนังสือ</div>
    <div class="result-inner">
      <div id="resultContent" class="placeholder">กรอกข้อมูลด้านบนแล้วกด "คำนวณราคา"</div>
    </div>
  </div>
</div>

<script>
var innerPrices = {
  a4: { bw_bond_double:0.65, bw_bond_single:1.00, bw_eyecare_double:1.00, bw_eyecare_single:1.50, color_bond_double:15.00, color_bond_single:20.00, color_art_double:-1, color_art_single:-1, color_eyecare_double:18.00, color_eyecare_single:22.00 },
  b5: { bw_bond_double:0.65, bw_bond_single:1.00, bw_eyecare_double:1.00, bw_eyecare_single:1.50, color_bond_double:15.00, color_bond_single:20.00, color_art_double:-1, color_art_single:-1, color_eyecare_double:18.00, color_eyecare_single:22.00 },
  a5: { bw_bond_double:0.50, bw_bond_single:0.95, bw_eyecare_double:0.95, bw_eyecare_single:1.40, color_bond_double:10.00, color_bond_single:15.00, color_art_double:-1, color_art_single:-1, color_eyecare_double:12.00, color_eyecare_single:16.00 },
  a3: { bw_bond_double:1.30, bw_bond_single:2.00, bw_eyecare_double:2.00, bw_eyecare_single:3.00, color_bond_double:30.00, color_bond_single:40.00, color_art_double:-1, color_art_single:-1, color_eyecare_double:36.00, color_eyecare_single:44.00 }
};
var coverPrices = { a4:{color4_1:30,color4_2:50,bw:20}, b5:{color4_1:30,color4_2:50,bw:20}, a5:{color4_1:25,color4_2:40,bw:15}, a3:{color4_1:40,color4_2:65,bw:30} };
var laminatePrices = { a4:{none:0,gloss:15,matt:15}, b5:{none:0,gloss:15,matt:15}, a5:{none:0,gloss:12,matt:12}, a3:{none:0,gloss:20,matt:20} };
var bindingPrices = { a4:{perfect:20,saddle:5,spiral:-1}, b5:{perfect:20,saddle:5,spiral:-1}, a5:{perfect:15,saddle:5,spiral:-1}, a3:{perfect:25,saddle:5,spiral:-1} };
var sizeNames = {a4:'A4',b5:'B5',a5:'A5',a3:'A3'};
var coverNames = {color4_1:'4 สี (1 ด้าน)',color4_2:'4 สี (2 ด้าน)',bw:'ขาว-ดำ'};
var laminateNames = {none:'ไม่เคลือบ',gloss:'เคลือบ PVC มัน',matt:'เคลือบ PVC ด้าน'};
var bindingNames = {perfect:'ใสสันกาว',saddle:'เย็บกลาง/เย็บมุม',spiral:'สันห่วง/ขดลวด'};

function getRadio(name) {
  var els = document.getElementsByName(name);
  for (var i = 0; i < els.length; i++) { if (els[i].checked) return els[i].value; }
  return 'double';
}

function calculate() {
  var size = document.getElementById('bookSize').value;
  var bwPages = parseInt(document.getElementById('bwPages').value) || 0;
  var colorPages = parseInt(document.getElementById('colorPages').value) || 0;
  var bwPaper = document.getElementById('bwPaper').value;
  var colorPaper = document.getElementById('colorPaper').value;
  var bwSide = getRadio('bwSide');
  var colorSide = getRadio('colorSide');
  var copies = parseInt(document.getElementById('copies').value) || 1;
  var coverType = document.getElementById('coverType').value;
  var laminate = document.getElementById('laminate').value;
  var binding = document.getElementById('binding').value;

  var P = innerPrices[size];
  var rows = [], total = 0, inquiries = [];

  if (bwPages > 0) {
    var key = 'bw_' + bwPaper + '_' + bwSide;
    var rate = P[key] || 0;
    var cost = bwPages * rate * copies;
    total += cost;
    rows.push(['เนื้อในขาว-ดำ ' + bwPages + ' หน้า (' + (bwSide==='double'?'หน้า-หลัง':'หน้าเดียว') + ')', cost.toLocaleString() + ' ฿']);
  }

  if (colorPages > 0) {
    var ckey = 'color_' + colorPaper + '_' + colorSide;
    var crate = P[ckey] || 0;
    if (crate === -1) {
      inquiries.push('กระดาษอาร์ต 4 สี ราคาขึ้นอยู่กับแกรม กรุณาติดต่อเจ้าหน้าที่');
      rows.push(['เนื้อใน 4 สี ' + colorPages + ' หน้า', '<span class="inquiry">สอบถาม</span>']);
    } else {
      var ccost = colorPages * crate * copies;
      total += ccost;
      rows.push(['เนื้อใน 4 สี ' + colorPages + ' หน้า (' + (colorSide==='double'?'หน้า-หลัง':'หน้าเดียว') + ')', ccost.toLocaleString() + ' ฿']);
    }
  }

  var coverCost = (coverPrices[size][coverType] || 0) * copies;
  total += coverCost;
  rows.push(['ปก ' + coverNames[coverType], coverCost.toLocaleString() + ' ฿']);

  var laminateCost = (laminatePrices[size][laminate] || 0) * copies;
  if (laminateCost > 0) { total += laminateCost; }
  rows.push([laminateNames[laminate], laminateCost > 0 ? laminateCost.toLocaleString() + ' ฿' : '-']);

  var bindRate = bindingPrices[size][binding] || 0;
  if (bindRate === -1) {
    inquiries.push('สันห่วง/ขดลวด ราคาขึ้นอยู่กับจำนวนหน้า กรุณาติดต่อเจ้าหน้าที่');
    rows.push([bindingNames[binding], '<span class="inquiry">สอบถาม</span>']);
  } else if (bindRate > 0) {
    var bindCost = bindRate * copies;
    total += bindCost;
    rows.push([bindingNames[binding], bindCost.toLocaleString() + ' ฿']);
  } else {
    rows.push([bindingNames[binding], '-']);
  }

  var html = '<table class="result-table"><tr><th>รายการ</th><th>ราคา</th></tr>';
  for (var i = 0; i < rows.length; i++) {
    html += '<tr><td>' + rows[i][0] + '</td><td>' + rows[i][1] + '</td></tr>';
  }

  if (inquiries.length === 0) {
    var perBook = total / copies;
    html += '<tr class="total-row"><td>รวมทั้งหมด ' + copies + ' เล่ม</td><td>' + total.toLocaleString() + ' ฿</td></tr>';
    html += '<tr class="per-book-row"><td>ราคาต่อเล่ม</td><td>' + perBook.toFixed(2) + ' ฿/เล่ม</td></tr>';
  } else {
    html += '<tr class="total-row"><td>ราคารวม</td><td><span class="inquiry">ไม่สามารถคำนวณได้</span></td></tr>';
  }
  html += '</table>';

  for (var j = 0; j < inquiries.length; j++) {
    html += '<div class="note">⚠️ ' + inquiries[j] + '</div>';
  }
  html += '<div class="note">⚠️ ราคาเบื้องต้น ยังไม่รวม VAT และค่าจัดส่ง กรุณายืนยันราคาจริงกับเจ้าหน้าที่ก่อนสั่งพิมพ์</div>';

  document.getElementById('resultHeader').textContent = 'ผลการคำนวณราคาพิมพ์หนังสือ — ' + sizeNames[size] + ' จำนวน ' + copies + ' เล่ม';
  document.getElementById('resultContent').innerHTML = html;
}

function clearForm() {
  document.getElementById('totalPages').value = '';
  document.getElementById('bwPages').value = 0;
  document.getElementById('colorPages').value = 0;
  document.getElementById('copies').value = 1;
  document.getElementById('resultHeader').textContent = 'กรุณาระบุข้อมูลหนังสือ';
  document.getElementById('resultContent').innerHTML = '<div class="placeholder">กรอกข้อมูลด้านบนแล้วกด "คำนวณราคา"</div>';
}
</script>
</body>
</html>
